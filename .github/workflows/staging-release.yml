# Build firmware from staging branch, create a GitHub pre-release,
# and push to the staging channel on the CDN.
# Triggers on push to the staging branch.
#
# Tag format: staging-v{STAGING_BASE}-{N}
#   STAGING_BASE = hardcoded milestone version set below (bump when you want the
#                  staging channel's version series to jump visibly).
#   N            = number of commits on this staging branch since it diverged
#                  from the last `v*` tag — purely for uniqueness / ordering.
# Example: staging-v0.6.0-51 (51 commits past the last v* tag).
# The "staging-" prefix ensures binaries are never confused with stable releases.
name: Staging Release

on:
  push:
    branches:
      - staging

permissions:
  contents: write

jobs:
  # ── Derive version tag from git history ──
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.derive.outputs.tag }}
      build_name: ${{ steps.derive.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Derive staging tag
        id: derive
        env:
          STAGING_BASE: v0.6.0
        run: |
          LAST_VTAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo "")
          if [ -n "$LAST_VTAG" ]; then
            DISTANCE=$(git rev-list "${LAST_VTAG}..HEAD" --count)
          else
            DISTANCE=$(git rev-list HEAD --count)
          fi
          TAG="staging-${STAGING_BASE}-${DISTANCE}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Base: $STAGING_BASE  Last v* tag: ${LAST_VTAG:-<none>}  Distance: $DISTANCE  Tag: $TAG"

  # ── Step 1: Build firmware ──
  firmware:
    needs: prepare
    uses: ./.github/workflows/build-firmware.yml
    with:
      build_name: ${{ needs.prepare.outputs.tag }}

  # ── Step 2: Create GitHub pre-release ──
  release:
    needs: [prepare, firmware]
    runs-on: ubuntu-latest
    steps:
      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware-${{ needs.prepare.outputs.tag }}
          path: release-assets/

      - name: List release assets
        run: find release-assets/ -type f | sort

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: "TBD-16 staging — ${{ needs.prepare.outputs.tag }}"
          prerelease: true
          files: release-assets/**/*
          body: |
            Staging build from branch `staging`.
            Tag: `${{ needs.prepare.outputs.tag }}`
            Commit: `${{ github.sha }}`
            ${{ github.event.head_commit.message }}

  # ── Step 3: Push to CDN staging channel ──
  publish-cdn:
    needs: [prepare, firmware, release]
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to firmware CDN
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.FIRMWARE_CDN_TOKEN }}
          repository: dadamachines/dada-tbd-firmware
          event-type: firmware-update
          client-payload: >-
            {
              "channel": "staging",
              "tag": "${{ needs.prepare.outputs.tag }}",
              "artifact_name": "firmware-${{ needs.prepare.outputs.tag }}",
              "run_id": "${{ github.run_id }}",
              "token": "${{ secrets.FIRMWARE_CDN_TOKEN }}",
              "webui_version": "${{ needs.firmware.outputs.webui_version }}"
            }
