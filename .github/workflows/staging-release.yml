# Build firmware from staging branch, create a GitHub pre-release,
# and push to the staging channel on the CDN.
# Triggers on push to the staging branch.
#
# Tag format: staging-v{base}-{N}
#   base = latest reachable v* tag (e.g. v0.4.2)
#   N    = number of commits since that tag
# Example: staging-v0.4.2-3 (3 commits after v0.4.2 on staging)
# The "staging-" prefix ensures binaries are never confused with stable releases.
name: Staging Release

on:
  push:
    branches:
      - staging

permissions:
  contents: write

jobs:
  # ── Derive version tag from git history ──
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.derive.outputs.tag }}
      build_name: ${{ steps.derive.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Derive staging tag from git describe
        id: derive
        run: |
          BASE=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo "v0.0.0")
          DISTANCE=$(git rev-list "${BASE}..HEAD" --count 2>/dev/null || git rev-list HEAD --count)
          TAG="staging-${BASE}-${DISTANCE}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Base: $BASE  Distance: $DISTANCE  Tag: $TAG"

  # ── Step 1: Build firmware ──
  firmware:
    needs: prepare
    uses: ./.github/workflows/build-firmware.yml
    with:
      build_name: ${{ needs.prepare.outputs.tag }}

  # ── Step 2: Create GitHub pre-release ──
  release:
    needs: [prepare, firmware]
    runs-on: ubuntu-latest
    steps:
      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware-${{ needs.prepare.outputs.tag }}
          path: release-assets/

      - name: List release assets
        run: find release-assets/ -type f | sort

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: "TBD-16 staging — ${{ needs.prepare.outputs.tag }}"
          prerelease: true
          files: release-assets/**/*
          body: |
            Staging build from branch `staging`.
            Tag: `${{ needs.prepare.outputs.tag }}`
            Commit: `${{ github.sha }}`
            ${{ github.event.head_commit.message }}

  # ── Step 3: Push to CDN staging channel ──
  publish-cdn:
    needs: [prepare, firmware, release]
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to firmware CDN
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.FIRMWARE_CDN_TOKEN }}
          repository: dadamachines/dada-tbd-firmware
          event-type: firmware-update
          client-payload: >-
            {
              "channel": "staging",
              "tag": "${{ needs.prepare.outputs.tag }}",
              "artifact_name": "firmware-${{ needs.prepare.outputs.tag }}",
              "run_id": "${{ github.run_id }}",
              "token": "${{ secrets.FIRMWARE_CDN_TOKEN }}",
              "webui_version": "${{ needs.firmware.outputs.webui_version }}"
            }
