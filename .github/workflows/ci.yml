# CI: Build-check firmware on PRs and on pushes to dada-tbd-master.
# Only triggers when firmware-relevant files change — docs-only commits
# do NOT trigger a firmware build.
name: CI

on:
  pull_request:
    branches: [dada-tbd-master]
    paths:
      - "main/**"
      - "components/**"
      - "CMakeLists.txt"
      - "sdkconfig"
      - "sdkconfig.defaults"
      - "partitions_example.csv"
      - "patches/**"
      - "sdcard_image/**"
      - "sample_rom/**"
      - "create_sd_archive.sh"
      - "create_unified_p4_firmware.sh"
      - ".github/workflows/build-firmware.yml"
      - ".github/workflows/ci.yml"

  push:
    branches: [dada-tbd-master]
    paths:
      - "main/**"
      - "components/**"
      - "CMakeLists.txt"
      - "sdkconfig"
      - "sdkconfig.defaults"
      - "partitions_example.csv"
      - "patches/**"
      - "sdcard_image/**"
      - "sample_rom/**"
      - "create_sd_archive.sh"
      - "create_unified_p4_firmware.sh"
      - ".github/workflows/build-firmware.yml"
      - ".github/workflows/ci.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-check:
    uses: ./.github/workflows/build-firmware.yml
    with:
      build_name: ci-${{ github.sha }}
